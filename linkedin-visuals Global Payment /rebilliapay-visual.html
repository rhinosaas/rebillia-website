<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RebilliaPay - Visual</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #E8E6F0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: 1200px;
            height: 628px;
            background: linear-gradient(145deg, #F0F0FB 0%, #F7F5FC 40%, #EEEDF6 100%);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background glow effects */
        .card::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(92, 46, 145, 0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(38, 42, 255, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Top section: logos + X */
        .logos-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            margin-bottom: 44px;
        }

        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-block img {
            height: 52px;
            object-fit: contain;
        }

        .rebillia-logo {
            height: 52px;
        }

        .gp-logo {
            height: 48px;
        }

        .x-symbol {
            font-size: 36px;
            font-weight: 300;
            color: rgba(27, 15, 48, 0.25);
            margin-top: -4px;
        }

        /* Arrow / transition */
        .arrow-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .arrow-line {
            width: 2px;
            height: 32px;
            background: linear-gradient(180deg, rgba(27, 15, 48, 0.08) 0%, #5C2E91 100%);
        }

        .arrow-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-icon svg {
            width: 28px;
            height: 28px;
        }

        /* RebilliaPay result */
        .result-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .introducing {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #5C2E91;
        }

        .rebilliapay-name {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .rebilliapay-name .rebillia {
            color: #1B0F30;
        }

        .rebilliapay-name .pay {
            color: #5C2E91;
        }

        .tagline {
            font-size: 17px;
            font-weight: 400;
            color: rgba(27, 15, 48, 0.5);
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        /* Glow behind RebilliaPay */
        .glow {
            position: absolute;
            width: 500px;
            height: 120px;
            background: radial-gradient(ellipse, rgba(92, 46, 145, 0.08) 0%, transparent 70%);
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="glow"></div>
        <div class="content">

            <!-- Logos row -->
            <div class="logos-row">
                <div class="logo-block">
                    <img src="../logo-dark.png" alt="Rebillia" class="rebillia-logo">
                </div>

                <span class="x-symbol">&#x2715;</span>

                <div class="logo-block">
                    <img src="../logos/global-payments-official.svg" alt="Global Payments" class="gp-logo">
                </div>
            </div>

            <!-- Arrow down -->
            <div class="arrow-section">
                <div class="arrow-line"></div>
                <div class="arrow-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#5C2E91" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>
            </div>

            <!-- RebilliaPay -->
            <div class="result-section">
                <span class="introducing">Introducing</span>
                <div class="rebilliapay-name">
                    <span class="rebillia">Rebillia</span><span class="pay">Pay</span>
                </div>
                <p class="tagline">Powered by Global Payments</p>
            </div>

        </div>
    </div>
</body>
</html>
